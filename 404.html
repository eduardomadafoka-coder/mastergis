<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Página no encontrada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; font-family: 'Inter', sans-serif; overflow: hidden; }
        body {
            background: radial-gradient(ellipse at 60% 40%, #4a3a7a 0%, #3b2d6e 30%, #2a1f55 60%, #1e1640 100%);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0; animation: twinkle var(--d,3s) var(--delay,0s) infinite ease-in-out; }
        @keyframes twinkle { 0%,100%{opacity:0;transform:scale(.8)} 50%{opacity:var(--op,.7);transform:scale(1)} }
        .planet-earth { position:fixed; top:12%; left:10%; width:110px; height:110px; border-radius:50%; background:radial-gradient(circle at 35% 35%,#6ecfff 0%,#29aadf 40%,#1a7abf 70%,#0d4f8c 100%); box-shadow:inset -18px -10px 30px rgba(0,0,0,.35),0 0 30px rgba(100,200,255,.15); animation:float 6s ease-in-out infinite; z-index:1; overflow:hidden; }
        .planet-earth::before { content:''; position:absolute; top:20%; left:25%; width:35px; height:25px; background:#4caf7a; border-radius:40% 60% 55% 45%; box-shadow:15px 5px 0 8px #4caf7a,25px 20px 0 5px #5bbf8a; }
        .planet-earth::after { content:''; position:absolute; bottom:25%; left:15%; width:20px; height:15px; background:#4caf7a; border-radius:50%; }
        .moon { position:fixed; top:8%; left:22%; width:38px; height:38px; border-radius:50%; background:radial-gradient(circle at 40% 35%,#e8e8e8 0%,#c8c8c8 50%,#a8a8a8 100%); box-shadow:inset -5px -3px 10px rgba(0,0,0,.25); animation:float 8s ease-in-out infinite reverse; z-index:1; }
        .astronaut { position:fixed; bottom:12%; right:8%; width:130px; animation:floatRotate 7s ease-in-out infinite; z-index:1; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        @keyframes floatRotate { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-18px) rotate(5deg)} }
        .content { position:relative; z-index:2; text-align:center; user-select:none; }
        .number-404 { font-size:clamp(7rem,18vw,14rem); font-weight:900; color:rgba(255,255,255,.95); line-height:1; letter-spacing:-4px; text-shadow:0 4px 40px rgba(0,0,0,.3); }
        .subtitle { font-size:clamp(.75rem,1.5vw,.95rem); font-weight:300; letter-spacing:5px; color:rgba(255,255,255,.75); text-transform:uppercase; margin-top:.5rem; margin-bottom:2.5rem; line-height:1.8; }
        .btn-back { display:inline-block; border:1.5px solid rgba(255,255,255,.6); color:rgba(255,255,255,.9); font-family:'Inter',sans-serif; font-size:.88rem; font-weight:400; letter-spacing:1px; padding:.6rem 2rem; border-radius:30px; text-decoration:none; background:transparent; cursor:pointer; transition:background .25s,color .25s,border-color .25s; }
        .btn-back:hover { background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.9); color:#fff; }
        .dot { position:fixed; width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,.35); z-index:0; animation:twinkle var(--d,4s) var(--delay,0s) infinite; }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="dot" style="top:45%;left:15%;--d:5s;--delay:.5s;--op:.5;width:6px;height:6px;"></div>
    <div class="dot" style="top:20%;left:55%;--d:4s;--delay:1s;--op:.4;"></div>
    <div class="dot" style="top:70%;left:40%;--d:6s;--delay:0s;--op:.5;"></div>
    <div class="dot" style="top:30%;left:80%;--d:3s;--delay:2s;--op:.4;"></div>
    <div class="dot" style="top:80%;left:20%;--d:5s;--delay:1.5s;--op:.3;"></div>
    <div class="planet-earth"></div>
    <div class="moon"></div>
    <div class="astronaut">
        <svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="60" cy="100" rx="28" ry="35" fill="#e8e8e8"/>
            <rect x="47" y="88" width="26" height="18" rx="4" fill="#c8c8d8"/>
            <rect x="51" y="92" width="8" height="5" rx="1" fill="#7c6fa8"/>
            <rect x="62" y="92" width="5" height="5" rx="1" fill="#e63329"/>
            <rect x="51" y="100" width="18" height="3" rx="1" fill="#aaa8c0"/>
            <circle cx="60" cy="62" r="24" fill="#d0d0e0"/>
            <ellipse cx="60" cy="60" rx="17" ry="15" fill="#7c5cbf"/>
            <ellipse cx="55" cy="55" rx="5" ry="4" fill="rgba(255,255,255,0.15)"/>
            <ellipse cx="30" cy="98" rx="9" ry="22" fill="#e0e0e0" transform="rotate(15 30 98)"/>
            <ellipse cx="90" cy="98" rx="9" ry="22" fill="#e0e0e0" transform="rotate(-15 90 98)"/>
            <circle cx="24" cy="118" r="7" fill="#d0d0d0"/>
            <circle cx="96" cy="118" r="7" fill="#d0d0d0"/>
            <ellipse cx="47" cy="136" rx="10" ry="16" fill="#d8d8d8" transform="rotate(5 47 136)"/>
            <ellipse cx="73" cy="136" rx="10" ry="16" fill="#d8d8d8" transform="rotate(-5 73 136)"/>
            <ellipse cx="44" cy="150" rx="12" ry="7" fill="#bbbbc8"/>
            <ellipse cx="76" cy="150" rx="12" ry="7" fill="#bbbbc8"/>
            <rect x="42" y="78" width="36" height="22" rx="6" fill="#c8c8d8"/>
        </svg>
    </div>
    <div class="content">
        <div class="number-404">404</div>
        <p class="subtitle">LOOKS LIKE YOU ARE<br>LOST IN SPACE</p>
        <a href="index.html" class="btn-back">Regresar</a>
    </div>
<script>
    var s=document.getElementById('stars'),h='';
    for(var i=0;i<120;i++){
        var sz=Math.random()*2.5+.5,t=Math.random()*100,l=Math.random()*100,
            d=(Math.random()*4+2).toFixed(2),dl=(Math.random()*5).toFixed(2),op=(Math.random()*.6+.3).toFixed(2);
        h+='<div class="star" style="width:'+sz+'px;height:'+sz+'px;top:'+t+'%;left:'+l+'%;--delay:'+dl+'s;--d:'+d+'s;--op:'+op+';"></div>';
    }
    s.innerHTML=h;
</script>
</body>
</html>
