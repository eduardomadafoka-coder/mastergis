<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Página no encontrada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* ── FONDO ESPACIAL ── */
        body {
            background: radial-gradient(ellipse at 60% 40%, #4a3a7a 0%, #3b2d6e 30%, #2a1f55 60%, #1e1640 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* ── ESTRELLAS generadas con CSS ── */
        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--d, 3s) var(--delay, 0s) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.8); }
            50%       { opacity: var(--op, 0.7); transform: scale(1); }
        }

        /* ── PLANETA TIERRA — esquina superior izquierda ── */
        .planet-earth {
            position: fixed;
            top: 12%;
            left: 10%;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 35% 35%, #6ecfff 0%, #29aadf 40%, #1a7abf 70%, #0d4f8c 100%);
            box-shadow:
                inset -18px -10px 30px rgba(0,0,0,0.35),
                0 0 30px rgba(100,200,255,0.15);
            animation: float 6s ease-in-out infinite;
            z-index: 1;
            overflow: hidden;
        }

        /* Continentes */
        .planet-earth::before {
            content: '';
            position: absolute;
            top: 20%; left: 25%;
            width: 35px; height: 25px;
            background: #4caf7a;
            border-radius: 40% 60% 55% 45%;
            box-shadow: 15px 5px 0 8px #4caf7a, 25px 20px 0 5px #5bbf8a;
        }

        .planet-earth::after {
            content: '';
            position: absolute;
            bottom: 25%; left: 15%;
            width: 20px; height: 15px;
            background: #4caf7a;
            border-radius: 50%;
        }

        /* ── LUNA — arriba del planeta ── */
        .moon {
            position: fixed;
            top: 8%;
            left: 22%;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: radial-gradient(circle at 40% 35%, #e8e8e8 0%, #c8c8c8 50%, #a8a8a8 100%);
            box-shadow: inset -5px -3px 10px rgba(0,0,0,0.25), 0 0 15px rgba(255,255,255,0.1);
            animation: float 8s ease-in-out infinite reverse;
            z-index: 1;
        }

        /* ── ASTRONAUTA — derecha ── */
        .astronaut {
            position: fixed;
            bottom: 12%;
            right: 8%;
            width: 130px;
            animation: floatRotate 7s ease-in-out infinite;
            z-index: 1;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-14px); }
        }

        @keyframes floatRotate {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            50%       { transform: translateY(-18px) rotate(5deg); }
        }

        /* SVG astronauta inline */
        .astronaut svg { width: 100%; height: auto; }

        /* ── CONTENIDO CENTRAL ── */
        .content {
            position: relative;
            z-index: 2;
            text-align: center;
            user-select: none;
        }

        .number-404 {
            font-size: clamp(7rem, 18vw, 14rem);
            font-weight: 900;
            color: rgba(255,255,255,0.95);
            line-height: 1;
            letter-spacing: -4px;
            text-shadow: 0 4px 40px rgba(0,0,0,0.3);
        }

        .subtitle {
            font-size: clamp(0.75rem, 1.5vw, 0.95rem);
            font-weight: 300;
            letter-spacing: 5px;
            color: rgba(255,255,255,0.75);
            text-transform: uppercase;
            margin-top: 0.5rem;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        /* Botón "Regresar" — borde blanco redondeado igual al modelo */
        .btn-back {
            display: inline-block;
            border: 1.5px solid rgba(255,255,255,0.6);
            color: rgba(255,255,255,0.9);
            font-family: 'Inter', sans-serif;
            font-size: 0.88rem;
            font-weight: 400;
            letter-spacing: 1px;
            padding: 0.6rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            background: transparent;
            cursor: pointer;
            transition: background .25s, color .25s, border-color .25s;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.9);
            color: #fff;
        }

        /* ── Puntos decorativos dispersos ── */
        .dot {
            position: fixed;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            z-index: 0;
            animation: twinkle var(--d, 4s) var(--delay, 0s) infinite;
        }
    </style>
</head>
<body>

    <!-- Estrellas -->
    <div class="stars" id="stars"></div>

    <!-- Puntos decorativos grandes -->
    <div class="dot" style="top:45%;left:15%;--d:5s;--delay:0.5s;--op:0.5;width:6px;height:6px;"></div>
    <div class="dot" style="top:20%;left:55%;--d:4s;--delay:1s;--op:0.4;"></div>
    <div class="dot" style="top:70%;left:40%;--d:6s;--delay:0s;--op:0.5;"></div>
    <div class="dot" style="top:30%;left:80%;--d:3s;--delay:2s;--op:0.4;"></div>
    <div class="dot" style="top:80%;left:20%;--d:5s;--delay:1.5s;--op:0.3;"></div>
    <div class="dot" style="top:60%;left:85%;--d:4s;--delay:0.8s;--op:0.4;"></div>
    <div class="dot" style="top:15%;left:70%;--d:6s;--delay:2.5s;--op:0.3;"></div>

    <!-- Planeta Tierra -->
    <div class="planet-earth"></div>

    <!-- Luna -->
    <div class="moon"></div>

    <!-- Astronauta SVG -->
    <div class="astronaut">
        <svg viewBox="0 0 120 160" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Cuerpo traje -->
            <ellipse cx="60" cy="100" rx="28" ry="35" fill="#e8e8e8"/>
            <!-- Pecho panel -->
            <rect x="47" y="88" width="26" height="18" rx="4" fill="#c8c8d8"/>
            <rect x="51" y="92" width="8" height="5" rx="1" fill="#7c6fa8"/>
            <rect x="62" y="92" width="5" height="5" rx="1" fill="#e63329"/>
            <rect x="51" y="100" width="18" height="3" rx="1" fill="#aaa8c0"/>
            <!-- Casco -->
            <circle cx="60" cy="62" r="24" fill="#d0d0e0"/>
            <!-- Visor morado -->
            <ellipse cx="60" cy="60" rx="17" ry="15" fill="#7c5cbf"/>
            <ellipse cx="55" cy="55" rx="5" ry="4" fill="rgba(255,255,255,0.15)"/>
            <!-- Brazos -->
            <ellipse cx="30" cy="98" rx="9" ry="22" rx="9" fill="#e0e0e0" transform="rotate(15 30 98)"/>
            <ellipse cx="90" cy="98" rx="9" ry="22" fill="#e0e0e0" transform="rotate(-15 90 98)"/>
            <!-- Manos -->
            <circle cx="24" cy="118" r="7" fill="#d0d0d0"/>
            <circle cx="96" cy="118" r="7" fill="#d0d0d0"/>
            <!-- Piernas -->
            <ellipse cx="47" cy="136" rx="10" ry="16" fill="#d8d8d8" transform="rotate(5 47 136)"/>
            <ellipse cx="73" cy="136" rx="10" ry="16" fill="#d8d8d8" transform="rotate(-5 73 136)"/>
            <!-- Botas -->
            <ellipse cx="44" cy="150" rx="12" ry="7" fill="#bbbbc8"/>
            <ellipse cx="76" cy="150" rx="12" ry="7" fill="#bbbbc8"/>
            <!-- Mochila propulsor -->
            <rect x="42" y="78" width="36" height="22" rx="6" fill="#c8c8d8"/>
            <!-- Línea de seguridad -->
            <path d="M 24 112 Q 10 90 20 70 Q 30 50 60 45" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-dasharray="4 3" fill="none"/>
        </svg>
    </div>

    <!-- Contenido central -->
    <div class="content">
        <div class="number-404">404</div>
        <p class="subtitle">
            LOOKS LIKE YOU ARE<br>LOST IN SPACE
        </p>
        <!--
            El botón lleva al index.html
            Si este archivo está en la raíz: href="index.html"
            Si está en certificados/:        href="../index.html"
        -->
        <a href="../index.html" class="btn-back">Regresar</a>
    </div>

<script>
    // Genera estrellas aleatorias
    var starsEl = document.getElementById('stars');
    var html = '';
    for (var i = 0; i < 120; i++) {
        var size   = Math.random() * 2.5 + 0.5;
        var top    = Math.random() * 100;
        var left   = Math.random() * 100;
        var delay  = (Math.random() * 5).toFixed(2);
        var dur    = (Math.random() * 4 + 2).toFixed(2);
        var op     = (Math.random() * 0.6 + 0.3).toFixed(2);
        html += '<div class="star" style="'
            + 'width:' + size + 'px;height:' + size + 'px;'
            + 'top:' + top + '%;left:' + left + '%;'
            + '--delay:' + delay + 's;--d:' + dur + 's;--op:' + op + ';'
            + '"></div>';
    }
    starsEl.innerHTML = html;
</script>
</body>
</html>
